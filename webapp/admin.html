<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка курса</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Админ-панель</p>
          <h1>Курс Mini App</h1>
          <p class="page-subtitle">
            Управляйте ступенями, уроками и блоками урока. Пароль берётся из
            переменной <code>ADMIN_PASSWORD</code>.
          </p>
        </div>
        <a class="secondary-link" href="/">Открыть курс</a>
      </header>

      <section id="loginPanel" class="panel">
        <h2>Вход</h2>
        <form id="loginForm" class="stack-form">
          <label>
            Пароль администратора
            <input id="passwordInput" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary-button" type="submit">Войти</button>
        </form>
      </section>

      <section id="adminPanel" class="admin-grid" hidden>
        <article class="panel">
          <h2>Создать модуль</h2>
          <form id="moduleForm" class="stack-form">
            <label>
              Название модуля
              <input id="moduleTitle" type="text" maxlength="160" required>
            </label>
            <button class="primary-button" type="submit">Добавить модуль</button>
          </form>
        </article>

        <article class="panel">
          <h2>Создать урок</h2>
          <form id="lessonForm" class="stack-form">
            <label>
              Модуль
              <select id="lessonModule" required></select>
            </label>
            <label>
              Название урока
              <input id="lessonTitle" type="text" maxlength="160" required>
            </label>
            <label>
              Первый текстовый блок
              <textarea id="lessonContent" rows="6" placeholder="Можно оставить пустым и добавить блоки позже"></textarea>
            </label>
            <button class="primary-button" type="submit">Добавить урок</button>
          </form>
        </article>

        <article class="panel wide-panel">
          <div class="panel-title-row">
            <h2>Модули и уроки</h2>
            <button id="logoutButton" class="secondary-button" type="button">Выйти</button>
          </div>
          <p id="status" class="status" role="status"></p>
          <div id="courseEditor" class="course-editor"></div>
        </article>
      </section>
    </div>

    <script>
      "use strict";

      const loginPanel = document.querySelector("#loginPanel");
      const adminPanel = document.querySelector("#adminPanel");
      const loginForm = document.querySelector("#loginForm");
      const passwordInput = document.querySelector("#passwordInput");
      const moduleForm = document.querySelector("#moduleForm");
      const moduleTitle = document.querySelector("#moduleTitle");
      const lessonForm = document.querySelector("#lessonForm");
      const lessonModule = document.querySelector("#lessonModule");
      const lessonTitle = document.querySelector("#lessonTitle");
      const lessonContent = document.querySelector("#lessonContent");
      const courseEditor = document.querySelector("#courseEditor");
      const status = document.querySelector("#status");
      const logoutButton = document.querySelector("#logoutButton");

      let adminPassword = sessionStorage.getItem("courseAdminPassword") || "";
      let modules = [];
      let lessons = [];
      let blocksByLesson = new Map();

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      function getBlockTypeLabel(type) {
        if (type === "image") {
          return "Изображение";
        }
        if (type === "video") {
          return "Видео";
        }
        return "Текст";
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: {
            Accept: "application/json",
            "Content-Type": "application/json",
            "X-Admin-Password": adminPassword,
            ...(options.headers || {}),
          },
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || `Ошибка запроса: ${response.status}`);
        }
        return payload;
      }

      function createOption(module) {
        const option = document.createElement("option");
        option.value = String(module.id);
        option.textContent = module.title;
        return option;
      }

      function renderModuleSelect() {
        lessonModule.replaceChildren();
        modules.forEach((module) => lessonModule.append(createOption(module)));
        lessonModule.disabled = modules.length === 0;
      }

      function createField(labelText, value, elementType = "input") {
        const label = document.createElement("label");
        label.textContent = labelText;
        const field = document.createElement(elementType);
        if (elementType === "textarea") {
          field.rows = 6;
        } else {
          field.type = "text";
          field.maxLength = 160;
        }
        field.value = value || "";
        label.append(field);
        return { label, field };
      }

      function createBlockTypeSelect(value) {
        const select = document.createElement("select");
        ["text", "image", "video"].forEach((type) => {
          const option = document.createElement("option");
          option.value = type;
          option.textContent = getBlockTypeLabel(type);
          option.selected = type === value;
          select.append(option);
        });
        return select;
      }

      function validateBlock(type, value) {
        const content = value.trim();
        if (type === "text" && !content) {
          throw new Error("Текстовый блок не должен быть пустым.");
        }
        if ((type === "image" || type === "video") && !/^https?:\/\//.test(content)) {
          throw new Error("Ссылка должна начинаться с http:// или https://.");
        }
        return content;
      }

      function getRealBlocks(lessonId) {
        return (blocksByLesson.get(lessonId) || []).filter((block) => block.id !== null);
      }

      async function ensureLegacyConverted(lessonId) {
        const blocks = blocksByLesson.get(lessonId) || [];
        if (blocks.length !== 1 || blocks[0].id !== null) {
          return;
        }
        await requestJson(`/api/admin/lessons/${lessonId}/blocks`, {
          method: "POST",
          body: JSON.stringify({ type: "text", content: blocks[0].content }),
        });
      }

      async function addBlock(lessonId, type, rawContent) {
        const content = validateBlock(type, rawContent);
        await ensureLegacyConverted(lessonId);
        await requestJson(`/api/admin/lessons/${lessonId}/blocks`, {
          method: "POST",
          body: JSON.stringify({ type, content }),
        });
        setStatus("Блок добавлен.");
        await loadData();
      }

      async function moveBlock(lessonId, blockId, direction) {
        const blocks = getRealBlocks(lessonId);
        const index = blocks.findIndex((block) => block.id === blockId);
        const nextIndex = index + direction;
        if (index === -1 || nextIndex < 0 || nextIndex >= blocks.length) {
          return;
        }
        const reordered = [...blocks];
        [reordered[index], reordered[nextIndex]] = [reordered[nextIndex], reordered[index]];
        await requestJson(`/api/admin/lessons/${lessonId}/blocks/reorder`, {
          method: "POST",
          body: JSON.stringify({ block_ids: reordered.map((block) => block.id) }),
        });
        setStatus("Порядок блоков обновлён.");
        await loadData();
      }

      function renderAddBlockForm(container, lessonId) {
        const form = document.createElement("form");
        form.className = "block-add-form";

        const typeLabel = document.createElement("label");
        typeLabel.textContent = "Тип блока";
        const typeSelect = createBlockTypeSelect("text");
        typeLabel.append(typeSelect);

        const contentLabel = document.createElement("label");
        contentLabel.textContent = "Содержимое блока";
        const contentInput = document.createElement("textarea");
        contentInput.rows = 4;
        contentInput.placeholder = "Текст блока или ссылка на фото/видео";
        contentLabel.append(contentInput);

        const addButton = document.createElement("button");
        addButton.className = "secondary-button";
        addButton.type = "submit";
        addButton.textContent = "Добавить блок";

        form.append(typeLabel, contentLabel, addButton);
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          try {
            await addBlock(lessonId, typeSelect.value, contentInput.value);
          } catch (error) {
            setStatus(error.message, true);
          }
        });
        container.append(form);
      }

      function renderBlockEditor(container, lesson, block, index, totalRealBlocks) {
        const blockEditor = document.createElement("div");
        blockEditor.className = "block-editor";

        const header = document.createElement("div");
        header.className = "block-editor-header";

        const title = document.createElement("h5");
        title.textContent = block.id === null ? "Старый текст урока" : `Блок ${index + 1}`;

        const orderActions = document.createElement("div");
        orderActions.className = "mini-actions";

        if (block.id !== null) {
          const upButton = document.createElement("button");
          upButton.className = "icon-button";
          upButton.type = "button";
          upButton.textContent = "↑";
          upButton.disabled = index === 0;
          upButton.addEventListener("click", () => moveBlock(lesson.id, block.id, -1));

          const downButton = document.createElement("button");
          downButton.className = "icon-button";
          downButton.type = "button";
          downButton.textContent = "↓";
          downButton.disabled = index === totalRealBlocks - 1;
          downButton.addEventListener("click", () => moveBlock(lesson.id, block.id, 1));

          orderActions.append(upButton, downButton);
        }

        header.append(title, orderActions);
        blockEditor.append(header);

        if (block.id === null) {
          const legacy = document.createElement("p");
          legacy.className = "legacy-block";
          legacy.textContent = block.content;
          blockEditor.append(legacy);
          return blockEditor;
        }

        const typeLabel = document.createElement("label");
        typeLabel.textContent = "Тип";
        const typeSelect = createBlockTypeSelect(block.type);
        typeLabel.append(typeSelect);

        const contentLabel = document.createElement("label");
        contentLabel.textContent = "Содержимое";
        const contentInput = document.createElement("textarea");
        contentInput.rows = 5;
        contentInput.value = block.content;
        contentLabel.append(contentInput);

        const actions = document.createElement("div");
        actions.className = "actions-row";

        const saveButton = document.createElement("button");
        saveButton.className = "primary-button";
        saveButton.type = "button";
        saveButton.textContent = "Сохранить блок";
        saveButton.addEventListener("click", async () => {
          try {
            const currentInput = contentLabel.querySelector("textarea, input");
            const content = validateBlock(typeSelect.value, currentInput.value);
            await requestJson(`/api/admin/lesson-blocks/${block.id}`, {
              method: "PUT",
              body: JSON.stringify({ type: typeSelect.value, content }),
            });
            setStatus("Блок сохранён.");
            await loadData();
          } catch (error) {
            setStatus(error.message, true);
          }
        });

        const deleteButton = document.createElement("button");
        deleteButton.className = "danger-button";
        deleteButton.type = "button";
        deleteButton.textContent = "Удалить блок";
        deleteButton.addEventListener("click", async () => {
          if (!confirm("Удалить блок?")) {
            return;
          }
          await requestJson(`/api/admin/lesson-blocks/${block.id}`, { method: "DELETE" });
          setStatus("Блок удалён.");
          await loadData();
        });

        actions.append(saveButton, deleteButton);
        blockEditor.append(typeLabel, contentLabel, actions);
        return blockEditor;
      }

      function renderLessonEditor(moduleBlock, lesson) {
        const lessonBlock = document.createElement("div");
        lessonBlock.className = "lesson-editor";

        const lessonHeading = document.createElement("h4");
        lessonHeading.textContent = `Урок #${lesson.id}`;

        const { label: titleLabel, field: titleInput } = createField(
          "Название урока",
          lesson.title
        );

        const lessonActions = document.createElement("div");
        lessonActions.className = "actions-row";

        const saveLessonButton = document.createElement("button");
        saveLessonButton.className = "primary-button";
        saveLessonButton.type = "button";
        saveLessonButton.textContent = "Сохранить урок";
        saveLessonButton.addEventListener("click", async () => {
          await requestJson(`/api/admin/lessons/${lesson.id}`, {
            method: "PUT",
            body: JSON.stringify({
              module_id: lesson.module_id,
              title: titleInput.value,
              content: lesson.content || "",
            }),
          });
          setStatus("Урок обновлён.");
          await loadData();
        });

        const deleteLessonButton = document.createElement("button");
        deleteLessonButton.className = "danger-button";
        deleteLessonButton.type = "button";
        deleteLessonButton.textContent = "Удалить урок";
        deleteLessonButton.addEventListener("click", async () => {
          if (!confirm("Удалить урок?")) {
            return;
          }
          await requestJson(`/api/admin/lessons/${lesson.id}`, { method: "DELETE" });
          setStatus("Урок удалён.");
          await loadData();
        });

        lessonActions.append(saveLessonButton, deleteLessonButton);
        lessonBlock.append(lessonHeading, titleLabel, lessonActions);

        const blocksTitle = document.createElement("h5");
        blocksTitle.textContent = "Блоки урока";
        lessonBlock.append(blocksTitle);

        const blocks = blocksByLesson.get(lesson.id) || [];
        const realBlocks = blocks.filter((block) => block.id !== null);
        if (blocks.length === 0) {
          const empty = document.createElement("p");
          empty.className = "muted";
          empty.textContent = "В уроке пока нет блоков.";
          lessonBlock.append(empty);
        } else {
          blocks.forEach((block, index) => {
            const realIndex = realBlocks.findIndex((item) => item.id === block.id);
            lessonBlock.append(
              renderBlockEditor(
                lessonBlock,
                lesson,
                block,
                block.id === null ? index : realIndex,
                realBlocks.length
              )
            );
          });
        }

        renderAddBlockForm(lessonBlock, lesson.id);
        moduleBlock.append(lessonBlock);
      }

      function renderEditor() {
        renderModuleSelect();
        courseEditor.replaceChildren();

        if (modules.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = "Пока нет модулей. Создайте первый модуль выше.";
          courseEditor.append(empty);
          return;
        }

        modules.forEach((module) => {
          const moduleBlock = document.createElement("section");
          moduleBlock.className = "admin-card";

          const moduleHeading = document.createElement("h3");
          moduleHeading.textContent = `Модуль #${module.id}`;

          const { label: moduleLabel, field: moduleInput } = createField(
            "Название модуля",
            module.title
          );

          const moduleActions = document.createElement("div");
          moduleActions.className = "actions-row";

          const saveModuleButton = document.createElement("button");
          saveModuleButton.className = "primary-button";
          saveModuleButton.type = "button";
          saveModuleButton.textContent = "Сохранить модуль";
          saveModuleButton.addEventListener("click", async () => {
            await requestJson(`/api/admin/modules/${module.id}`, {
              method: "PUT",
              body: JSON.stringify({ title: moduleInput.value }),
            });
            setStatus("Модуль обновлён.");
            await loadData();
          });

          const deleteModuleButton = document.createElement("button");
          deleteModuleButton.className = "danger-button";
          deleteModuleButton.type = "button";
          deleteModuleButton.textContent = "Удалить модуль";
          deleteModuleButton.addEventListener("click", async () => {
            if (!confirm("Удалить модуль вместе со всеми уроками?")) {
              return;
            }
            await requestJson(`/api/admin/modules/${module.id}`, { method: "DELETE" });
            setStatus("Модуль удалён.");
            await loadData();
          });

          moduleActions.append(saveModuleButton, deleteModuleButton);
          moduleBlock.append(moduleHeading, moduleLabel, moduleActions);

          const moduleLessons = lessons.filter((lesson) => lesson.module_id === module.id);
          if (moduleLessons.length === 0) {
            const noLessons = document.createElement("p");
            noLessons.className = "muted";
            noLessons.textContent = "В этом модуле пока нет уроков.";
            moduleBlock.append(noLessons);
          }

          moduleLessons.forEach((lesson) => renderLessonEditor(moduleBlock, lesson));
          courseEditor.append(moduleBlock);
        });
      }

      async function loadData() {
        try {
          modules = await requestJson("/api/admin/modules");
          lessons = await requestJson("/api/admin/lessons");
          const blockPairs = await Promise.all(
            lessons.map(async (lesson) => [lesson.id, await requestJson(`/api/lessons/${lesson.id}/blocks`)])
          );
          blocksByLesson = new Map(blockPairs);
          renderEditor();
        } catch (error) {
          setStatus(error.message, true);
          loginPanel.hidden = false;
          adminPanel.hidden = true;
          sessionStorage.removeItem("courseAdminPassword");
        }
      }

      async function enterAdmin() {
        loginPanel.hidden = true;
        adminPanel.hidden = false;
        await loadData();
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        adminPassword = passwordInput.value;
        sessionStorage.setItem("courseAdminPassword", adminPassword);
        setStatus("");
        await enterAdmin();
      });

      logoutButton.addEventListener("click", () => {
        adminPassword = "";
        sessionStorage.removeItem("courseAdminPassword");
        loginPanel.hidden = false;
        adminPanel.hidden = true;
      });

      moduleForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await requestJson("/api/admin/modules", {
          method: "POST",
          body: JSON.stringify({ title: moduleTitle.value }),
        });
        moduleTitle.value = "";
        setStatus("Модуль создан.");
        await loadData();
      });

      lessonForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const lesson = await requestJson("/api/admin/lessons", {
          method: "POST",
          body: JSON.stringify({
            module_id: Number(lessonModule.value),
            title: lessonTitle.value,
            content: "",
          }),
        });
        const firstText = lessonContent.value.trim();
        if (firstText) {
          await requestJson(`/api/admin/lessons/${lesson.id}/blocks`, {
            method: "POST",
            body: JSON.stringify({ type: "text", content: firstText }),
          });
        }
        lessonTitle.value = "";
        lessonContent.value = "";
        setStatus("Урок создан.");
        await loadData();
      });

      if (adminPassword) {
        enterAdmin();
      }
    </script>
  </body>
</html>
